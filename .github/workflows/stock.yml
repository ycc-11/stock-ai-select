name: A股智能选股（技术指标+豆包+微信推送）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"  # 每日北京时间 9:00

jobs:
  stock-select:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install akshare openai requests python-dotenv

      - name: Run stock select
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python main.py

      - name: Commit report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add report/
          git commit -m "Auto update daily stock report"
          git push
